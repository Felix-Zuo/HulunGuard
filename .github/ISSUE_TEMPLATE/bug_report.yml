name: Bug report
description: Report incorrect behavior, crashes, or adapter failures.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What broke, and who is affected?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands, trace snippet, or adapter steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, HulunGuard version, adapter/runtime.

