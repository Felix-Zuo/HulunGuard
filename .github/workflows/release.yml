name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install
        run: uv sync --locked --extra dev
      - name: Ruff
        run: uv run python -m ruff check .
      - name: Tests
        run: uv run python -m pytest -q
      - name: HulunGuard validation
        run: uv run python -m hulun_guard validate
      - name: HulunGuard calibration
        run: uv run python -m hulun_guard calibrate
      - name: HulunGuard calibration drift
        run: uv run python -m hulun_guard calibration-drift
      - name: HulunGuard threat model
        run: uv run python -m hulun_guard threat-model-check --json
      - name: HulunGuard agent compatibility
        run: uv run python -m hulun_guard compatibility --json
      - name: HulunGuard integration kits
        run: uv run python -m hulun_guard integration-kit --agent all --output .hulun/integration-kits --force --verify --json
      - name: HulunGuard onboarding
        run: uv run python -m hulun_guard onboard --agent all --output .hulun/onboarding --force --json
      - name: HulunGuard adapter matrix
        run: uv run python -m hulun_guard adapter-matrix --json
      - name: HulunGuard collector smoke
        run: |
          tmp="$(mktemp -d)"
          uv run python -m hulun_guard --root "$tmp" collector smoke --json
          uv run python -m hulun_guard --root "$tmp" collector smoke --managed --scan --init-if-missing --json
          uv run python -m hulun_guard --root "$tmp" collector shutdown-check --json
          uv run python -m hulun_guard --root "$tmp" collector status --require-status-file --queue-pending-threshold 100 --dead-letter-threshold 0 --json
          uv run python -m hulun_guard --root "$tmp" collector metrics --require-status-file --queue-pending-threshold 100 --dead-letter-threshold 0
          uv run python -m hulun_guard --root "$tmp" collector alert-rules --output "$tmp/alert-rules" --force --json
          uv run python -m hulun_guard --root "$tmp" collector service-template --output "$tmp/service-templates" --force --json
          uv run python -m hulun_guard --root "$tmp" collector service-lifecycle --output "$tmp/service-lifecycle" --force --json
      - name: HulunGuard batched ingestion smoke
        run: |
          tmp="$(mktemp -d)"
          uv run python -m hulun_guard --root "$tmp" batch enqueue --type tool_result --phase verify --summary "batch smoke passed" --result pass --json
          printf '%s\n' '{"type":"tool_result","phase":"verify","summary":"stdin smoke passed","result":"pass","action_key":"stdin-smoke"}' | uv run python -m hulun_guard --root "$tmp" batch ingest-stdin --format generic --json
          uv run python -m hulun_guard --root "$tmp" batch status --json
          uv run python -m hulun_guard --root "$tmp" batch flush --scan --init-if-missing --json
      - name: HulunGuard trace doctor
        run: |
          printf '%s\n' '{"type":"tool_result","phase":"verify","summary":"pytest passed","result":"pass","action_key":"pytest","refs":["command:pytest"]}' > trace-doctor-sample.jsonl
          uv run python -m hulun_guard trace-doctor --file trace-doctor-sample.jsonl --format generic --json
      - name: HulunGuard schema compatibility
        run: uv run python -m hulun_guard schema-check --json
      - name: HulunGuard retention cleanup dry-run
        run: uv run python -m hulun_guard cleanup --json
      - name: HulunGuard benchmark
        run: uv run python -m hulun_guard benchmark --events 10000 --max-ms 1000
      - name: HulunGuard real-world benchmark
        run: uv run python -m hulun_guard benchmark --suite real-world
      - name: Build package
        run: uv run python -m build
      - name: Generate release metadata
        run: uv run python scripts/generate_release_metadata.py --verify --json
      - name: Verify release artifacts
        run: uv run python scripts/verify_release_artifacts.py
      - name: Verify GitHub release assets offline
        run: uv run python -m hulun_guard release-verify --asset-dir dist --skip-attestation --json
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: hulun-guard-dist-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error
      - name: Generate build provenance attestations
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: dist/*
      - name: Upload GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Automated release artifacts for ${GITHUB_REF_NAME}."
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
