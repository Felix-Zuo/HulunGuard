name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check .
      - name: Compile
        run: python -m compileall -q src tests
      - name: Tests
        run: python -m pytest -q
      - name: HulunGuard validation
        run: python -m hulun_guard validate
      - name: HulunGuard benchmark
        run: python -m hulun_guard benchmark --events 10000 --max-ms 1000
      - name: Build package
        run: python -m build

