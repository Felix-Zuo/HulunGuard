name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check .
      - name: Compile
        run: python -m compileall -q src tests
      - name: Tests
        run: python -m pytest -q
      - name: HulunGuard validation
        run: python -m hulun_guard validate
      - name: HulunGuard calibration
        run: python -m hulun_guard calibrate
      - name: HulunGuard calibration drift
        run: python -m hulun_guard calibration-drift
      - name: HulunGuard threat model
        run: python -m hulun_guard threat-model-check --json
      - name: HulunGuard agent compatibility
        run: python -m hulun_guard compatibility --json
      - name: HulunGuard integration kits
        run: python -m hulun_guard integration-kit --agent all --output .hulun/integration-kits --force --verify --json
      - name: HulunGuard onboarding
        run: python -m hulun_guard onboard --agent all --output .hulun/onboarding --force --json
      - name: HulunGuard adapter matrix
        run: python -m hulun_guard adapter-matrix --json
      - name: HulunGuard collector smoke
        run: |
          tmp="$(mktemp -d)"
          python -m hulun_guard --root "$tmp" collector smoke --json
          python -m hulun_guard --root "$tmp" collector smoke --managed --scan --init-if-missing --json
          python -m hulun_guard --root "$tmp" collector status --require-status-file --json
          python -m hulun_guard --root "$tmp" collector service-template --output "$tmp/service-templates" --force --json
      - name: HulunGuard batched ingestion smoke
        run: |
          tmp="$(mktemp -d)"
          python -m hulun_guard --root "$tmp" batch enqueue --type tool_result --phase verify --summary "batch smoke passed" --result pass --json
          printf '%s\n' '{"type":"tool_result","phase":"verify","summary":"stdin smoke passed","result":"pass","action_key":"stdin-smoke"}' | python -m hulun_guard --root "$tmp" batch ingest-stdin --format generic --json
          python -m hulun_guard --root "$tmp" batch status --json
          python -m hulun_guard --root "$tmp" batch flush --scan --init-if-missing --json
      - name: HulunGuard trace doctor
        run: |
          printf '%s\n' '{"type":"tool_result","phase":"verify","summary":"pytest passed","result":"pass","action_key":"pytest","refs":["command:pytest"]}' > trace-doctor-sample.jsonl
          python -m hulun_guard trace-doctor --file trace-doctor-sample.jsonl --format generic --json
      - name: HulunGuard schema compatibility
        run: python -m hulun_guard schema-check --json
      - name: HulunGuard retention cleanup dry-run
        run: python -m hulun_guard cleanup --json
      - name: HulunGuard benchmark
        run: python -m hulun_guard benchmark --events 10000 --max-ms 1000
      - name: HulunGuard real-world benchmark
        run: python -m hulun_guard benchmark --suite real-world
      - name: Build package
        run: python -m build
      - name: Generate release metadata
        run: python scripts/generate_release_metadata.py --verify --json
      - name: Verify release artifacts
        run: python scripts/verify_release_artifacts.py
      - name: Verify GitHub release assets offline
        run: python -m hulun_guard release-verify --asset-dir dist --skip-attestation --json
